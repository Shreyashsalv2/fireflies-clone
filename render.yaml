# Render Blueprint — deploys the FastAPI backend.
# In Render: New + > Blueprint > connect this repo. Render reads this file.
# GROQ_API_KEY and FRONTEND_URL are marked sync:false — set them in the dashboard.
services:
  - type: web
    name: fireflies-clone-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: FRONTEND_URL
        sync: false
